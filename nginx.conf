# Serves the built Vite SPA. Replaces nginx's stock default.conf, so the
# container listens only on 3000 (the port Coolify maps).
server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Fingerprinted build assets — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve real files (per-case PNGs under /zinda, /uxart, /ovork, …) when they
    # exist; otherwise fall back to index.html for the hash-routed SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
