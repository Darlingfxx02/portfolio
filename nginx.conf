# Serves the built Vite SPA. Replaces nginx's stock default.conf, so the
# container listens only on 3000 (the port Coolify maps).
server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Personalization API → backend Node service (portfolio-admin-server).
    # The public site fetches /api/config?to=slug at runtime (Live API).
    # NOTE: match the host below to your Coolify service name on the shared
    # network. If the backend is down, the SPA falls back to the default
    # (non-personalized) version, so the site stays up.
    location /api/ {
        # Resolve the backend at REQUEST time via Docker's embedded DNS, not at
        # startup — a literal upstream makes nginx [emerg]-crash when the
        # admin-server container isn't on the network. With a variable it boots
        # regardless; if the host is absent, /api/ → 502 and the SPA falls back.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $admin_upstream portfolio-admin-server;
        proxy_pass http://$admin_upstream:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fingerprinted build assets — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve real files (per-case PNGs under /zinda, /uxart, /ovork, …) when they
    # exist; otherwise fall back to index.html for the hash-routed SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
